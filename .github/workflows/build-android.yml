name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential ccache git zip unzip \
            gettext autopoint libtool automake \
            openjdk-17-jdk-headless python3-pip

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer cython pandas openpyxl python-calamine

      - name: 构建 APK（首次需 40-60 分钟下载 SDK）
        run: |
          yes | buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@main
        with:
          name: wirerecognition-apk
          path: |
            dist/android/*.apk
            bin/*.apk

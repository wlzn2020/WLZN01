name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }} || true

      - name: 用 Docker 打包 APK
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer:latest \
            buildozer android debug 2>&1

      - name: 查找并上传 APK
        run: |
          mkdir -p /tmp/apk
          find . -name "*.apk" -type f -exec cp {} /tmp/apk/ \; 2>/dev/null || true

      - name: 上传 APK 到 Actions
        uses: actions/upload-artifact@main
        with:
          name: wirerecognition-apk
          path: /tmp/apk/*.apk

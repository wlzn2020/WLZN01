name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 构建自定义 Docker 镜像
        run: |
          docker build -t buildozer-custom -f Dockerfile .

      - name: 打包 APK
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}:/home/user/hostcwd \
            buildozer-custom \
            android debug 2>&1

      - name: 查找并上传 APK
        run: |
          mkdir -p /tmp/apk
          find . -name "*.apk" -type f -exec cp {} /tmp/apk/ \; 2>/dev/null || true

      - name: 上传 APK 到 Actions
        uses: actions/upload-artifact@main
        with:
          name: wirerecognition-apk
          path: /tmp/apk/*.apk

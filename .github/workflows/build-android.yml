name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装 SDK 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext autopoint libtool automake \
            openjdk-17-jdk unzip zip

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Python 依赖
        run: |
          pip install buildozer cython pandas openpyxl python-calamine kivy

      - name: 构建 APK
        run: |
          yes | buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@main
        with:
          name: wirerecognition-apk
          path: |
            dist/android/*.apk
            bin/*.apk
